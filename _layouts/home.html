---
layout: default
---

<div class="home">
  {{ content }}

  {%- if site.posts.size > 0 -%}
    <ul class="post-list">
      {%- for post in site.posts -%}
        <li class="post-item">
          <div class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</div>
          <h2 class="post-title-line">
            <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
          </h2>
        </li>
      {%- endfor -%}
    </ul>
  {%- endif -%}
</div>
